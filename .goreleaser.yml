# WARNING: This file is autogenerated - changes will be overwritten if not made via https://github.com/pulumi/ci-mgmt
project_name: pulumi-aws-native
before:
  hooks:
  - make init_submodules
  - make codegen
  - make generate_schema
builds:
- id: build-provider
  dir: provider
  env:
  - CGO_ENABLED=0
  - GO111MODULE=on
  goos:
  - darwin
  - linux
  goarch:
  - amd64
  - arm64
  ignore: &a1 []
  main: ./cmd/pulumi-resource-aws-native/
  ldflags: &a2
    - -s
    - -w
    - -X
      github.com/pulumi/pulumi-aws-native/provider/pkg/version.Version={{.Tag}}
  binary: pulumi-resource-aws-native
- id: build-provider-sign-windows
  dir: provider
  env:
  - CGO_ENABLED=0
  - GO111MODULE=on
  goos:
  - windows
  goarch:
  - amd64
  - arm64
  ignore: *a1
  main: ./cmd/pulumi-resource-aws-native/
  ldflags: *a2
  binary: pulumi-resource-aws-native
  hooks:
    post:
    - make sign-goreleaser-exe-{{ .Arch }}
archives:
- name_template: "{{ .Binary }}-{{ .Tag }}-{{ .Os }}-{{ .Arch }}"
  id: archive
snapshot:
  name_template: "{{ .Tag }}-SNAPSHOT"
changelog:
  filters:
    exclude:
    - Merge branch
    - Merge pull request
    - \Winternal\W
    - \Wci\W
    - \Wchore\W
  sort: asc
  use: git
release:
  disable: false
blobs:
- provider: s3
  region: us-west-2
  bucket: get.pulumi.com
  folder: releases/plugins/
  ids:
  - archive
